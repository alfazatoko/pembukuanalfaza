<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfaza Cell</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #1a4fc4 0%, #2b67f6 50%, #5d9cec 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .splash { animation: fadeInUp 0.8s ease-out; padding: 20px; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 80px; height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .logo i { font-size: 45px; color: #2b67f6; }
        h1 { color: white; font-size: 24px; font-weight: 700; margin-bottom: 15px; }
        .salam { color: rgba(255,255,255,0.95); font-size: 18px; font-weight: 500; margin-bottom: 10px; }
        .welcome { color: rgba(255,255,255,0.85); font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .loading { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
        .loading-dot {
            width: 8px; height: 8px;
            background: white;
            border-radius: 50%;
            animation: loading 1.2s infinite ease-in-out;
        }
        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes loading {
            0%, 100% { transform: scale(0.5); opacity: 0.3; }
            50% { transform: scale(1); opacity: 1; }
        }
        .footer {
            position: absolute;
            bottom: 25px;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="splash">
        <div class="logo">
            <i class="fa-solid fa-store"></i>
        </div>
        <h1>ALFAZA CELL</h1>
        <div class="salam">Assalamualaikum</div>
        <div class="welcome">Selamat Datang<br>Semoga Hari ini lebih baik dari kemarin</div>
        <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
        <div class="footer">Alfaza Cell Pro • Kasir Digital</div>
    </div>
    <script>
        setTimeout(() => { window.location.href = "index.html"; }, 2000);
    </script>
</body>
</html>
